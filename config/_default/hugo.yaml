title: yewton.net
baseURL: http://localhost:1313/
defaultContentLanguage: ja
hasCJKLanguage: true

build:
  buildStats:
    enable: true

cascade:
  - target:
      path: /post/**
    commentable: true
    show_related: true
    show_breadcrumb: true
pagination:
  pagerSize: 10
enableEmoji: true
footnotereturnlinkcontents: "<sup>^</sup>"
ignoreFiles:
  - "\\.ipynb$"
  - ".ipynb_checkpoints$"
  - "\\.Rmd$"
  - "\\.Rmarkdown$"
  - "_files$"
  - "_cache$"

outputs:
  home: [ "HTML", "RSS", "JSON", "WebAppManifest" ]
  section: [ "HTML", "RSS" ]

mediaTypes:
  "application/manifest+json":
    suffixes: ["webmanifest"]

outputFormats:
  WebAppManifest:
    mediaType: "application/manifest+json"
    rel: "manifest"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 3

imaging:
  resampleFilter: "lanczos"
  quality: 75
  anchor: "smart"
  bgColor: "#ffffff"

taxonomies:
  tag: tags
  category: categories

permalinks:
  post: "/:year/:month/:day/:slug/"

module:
  imports:
    - path: github.com/HugoBlox/kit/modules/blox

related:
  includeNewer: true
  threshold: 80
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: date
      weight: 10

security:
  funcs:
    getenv:
      - "^HUGO_"
      - "^CI$"
      - "^WC_"
  exec:
    osEnv:
      - '(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE)$'
      - '^ASDF_DIR$'
      - '^HOME$'
